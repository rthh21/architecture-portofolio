<p class="title-text">Projects I have made</p>
<div class="project-grid">
  @for (project of myProjects; track project.id) {
    <div class="project-card">
      <img src={{project.img}}>
      <h3>{{ project.name }}</h3>   
      <p>Center, Berlin</p>
    </div>
  } @empty {
    <p class = "no-projects-card">No projects found!</p>
  }
</div>
